# FDE-SKILLS workspace config
# Scaffolded by /fde:init. Edit to add deliverable types or anonymization rules.
version: 1

# Deliverable types this workspace knows how to draft.
# Each maps to a schema in .fde/schemas/<id>.schema.yml whose slots persist
# and pre-populate across engagements (the compounding wedge).
deliverable_types:
  - id: discovery-doc
    label: Discovery Doc
    schema: discovery-doc.schema.yml
  - id: integration-spec
    label: Integration Spec
    schema: integration-spec.schema.yml
  - id: ontology-map
    label: Ontology Map
    schema: ontology-map.schema.yml
  - id: delivery-schedule
    label: Delivery Schedule
    schema: delivery-schedule.schema.yml
  - id: risk-register
    label: Risk Register
    schema: risk-register.schema.yml
  - id: findings-report
    label: Findings Report
    schema: findings-report.schema.yml
  - id: stakeholder-map
    label: Stakeholder Map
    schema: stakeholder-map.schema.yml
  - id: enablement-plan
    label: Enablement Plan
    schema: enablement-plan.schema.yml

# Mechanical redaction applied by fde-promote.sh before any slot value
# enters the shared corpus. The /fde:promote skill does the *semantic*
# anonymization (paraphrase, strip identifying detail); these regexes are
# the deterministic backstop so figures never leak even if the LLM misses one.
anonymization:
  redact_figures: true
  rules:
    - match: '\$[0-9][0-9,.]*'   # dollar amounts
      replace: '$<REDACTED>'
    - match: '[0-9]+%'           # percentages
      replace: '<N>%'

# fde-validate.sh fails if any engagement slug or display_name appears in
# .fde/corpus/. The corpus is the only place knowledge crosses engagements,
# and it must be client-anonymous.
confidentiality:
  corpus_must_not_contain: engagement_identifiers
