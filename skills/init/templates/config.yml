# FDE-SKILLS workspace config
# Scaffolded by /fde:init. Edit to add deliverable types or identifiers to redact.
version: 2

# Deliverable types this workspace knows how to draft.
# Each maps to a schema in .fde/schemas/<id>.schema.yml whose slots persist
# and pre-populate across engagements (the compounding wedge).
deliverable_types:
  - id: discovery-doc
    label: Discovery Doc
    schema: discovery-doc.schema.yml
  - id: integration-spec
    label: Integration Spec
    schema: integration-spec.schema.yml
  - id: ontology-map
    label: Ontology Map
    schema: ontology-map.schema.yml
  - id: delivery-schedule
    label: Delivery Schedule
    schema: delivery-schedule.schema.yml
  - id: risk-register
    label: Risk Register
    schema: risk-register.schema.yml
  - id: findings-report
    label: Findings Report
    schema: findings-report.schema.yml
  - id: stakeholder-map
    label: Stakeholder Map
    schema: stakeholder-map.schema.yml
  - id: enablement-plan
    label: Enablement Plan
    schema: enablement-plan.schema.yml

# Rule of Three: a pattern is a *candidate* at 1 sighting, *recurring* at 2,
# and gets *paved* into the schema at `threshold` sightings. Read by
# fde-promote.sh.
paving:
  threshold: 3

# Deterministic redaction, applied by fde-promote.sh and enforced by
# fde-validate.sh. The /fde:promote skill does the *semantic* anonymization
# (paraphrase away client specifics); the scripts are the mechanical backstop:
#   - dollar amounts and percentages are always stripped (hardcoded in
#     fde-promote.sh),
#   - engagement slugs + display-name tokens are always redacted and guarded
#     (derived by fde-identifiers.sh),
#   - extra_identifiers below are ALSO redacted and guarded — add person
#     names, internal system names, project codenames here. The scripts
#     cannot guess these; anything not listed relies on the LLM
#     anonymization pass.
anonymization:
  extra_identifiers: []
  # extra_identifiers:
  #   - "Jane Smith"
  #   - "MegaCRM"
